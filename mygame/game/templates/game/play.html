<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 80px; background: #f0f8ff; }
        input { padding: 10px; font-size: 18px; width: 100px; }
        button { padding: 10px 20px; font-size: 18px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        h1 { color: #333; }
        p { font-size: 22px; color: #e74c3c; }
    </style>
</head>
<body>
    <h1>🎯 Guess a Number (1–100)</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="number" name="guess" min="1" max="100" required autofocus />
        <button type="submit">Guess!</button>
    </form>
    <p>{{ message }}</p>
</body>
</html>
